name: Build release

# Build the app for Linux, macOS, and Windows in one shot. Each platform is built
# on its own native runner because the backend is a PyInstaller binary (which is
# host-native and cannot be cross-compiled) and macOS builds require macOS.
#
# Triggers:
#   • push a tag like v1.2.0  -> builds all three and attaches them to a Release
#   • "Run workflow" (manual) -> builds all three; download them from the run's Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # required to create/update the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"   # avoid cp1252 UnicodeEncodeError in Python output on Windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: build:linux
            artifact: electron-dist/*.AppImage
          - os: macos-latest
            target: build:mac
            artifact: electron-dist/*.dmg
          - os: windows-latest
            target: build:win
            artifact: electron-dist/*.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python build dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Build backend binary (PyInstaller)
        run: python build.py --build

      - name: Install Node dependencies
        run: npm ci

      - name: Package app (electron-builder)
        # --publish never: just build the installer. Publishing to the GitHub
        # Release is handled by the dedicated step below (electron-builder's own
        # publisher would otherwise demand a GH_TOKEN and fail).
        run: npm run ${{ matrix.target }} -- --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradenexus-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
